name: CI Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

env:
  PNPM_VERSION: '8.15.0'
  NODE_VERSION: '20'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────
  # Job 1: Lint & Type Check
  # ─────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Format check
        run: pnpm run format:check

      - name: Type check
        run: pnpm run type-check

  # ─────────────────────────────────────────
  # Job 2: Build Packages
  # ─────────────────────────────────────────
  build:
    name: Build Packages
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            packages/*/dist
          retention-days: 7

  # ─────────────────────────────────────────
  # Job 3: Unit Tests
  # ─────────────────────────────────────────
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests with coverage
        run: pnpm run test:ci

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-reports
          path: packages/*/coverage
          retention-days: 7

  # ─────────────────────────────────────────
  # Job 4: Integration Tests (Hiero Solo)
  # ─────────────────────────────────────────
  test-integration:
    name: Integration Tests — Hiero Solo Node
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: packages

      # Spin up an ephemeral Hiero Solo consensus + mirror node network.
      # hiero-ledger/hiero-solo-action launches both the consensus node and
      # the mirror-node REST API on localhost:5551 automatically.
      - name: Start Hiero Solo Network
        uses: hiero-ledger/hiero-solo-action@v1
        with:
          startup-timeout: '120'

      - name: Wait for Mirror Node REST API
        run: |
          echo "⏳ Waiting for Mirror Node REST API on http://localhost:5551 ..."
          timeout 90 bash -c \
            'until curl -sf http://localhost:5551/api/v1/network/nodes > /dev/null 2>&1; do
               echo "  ... not ready yet, retrying in 5s"
               sleep 5
             done'
          echo "✅ Mirror Node REST API is ready."

      - name: Run integration tests
        env:
          HIERO_NETWORK: local
          HIERO_MIRROR_NODE_URL: 'http://localhost:5551'
          HIERO_OPERATOR_ID: '0.0.2'
          HIERO_OPERATOR_KEY: '302e020100300506032b657004220420a608e2130a0a3cb34f86e757303006e31e47be7e0c3a8ef2b6a56c7a3c6dbaeb'
        run: |
          echo "🚀 Running integration tests against local Hiero Solo network..."
          # Integration test suite will be wired up in Phase 3.
          # For now we validate the network is accepting connections.
          curl -sf http://localhost:5551/api/v1/network/nodes | \
            python3 -c "import sys,json; d=json.load(sys.stdin); print(f'✅ Found {len(d[\"nodes\"])} consensus node(s)')"

      - name: Cleanup
        if: always()
        run: echo "ℹ️  Hiero Solo network will be torn down by the action post-step."

  # ─────────────────────────────────────────
  # Job 5: Gate — all checks must pass
  # ─────────────────────────────────────────
  all-checks:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs: [lint, build, test-unit, test-integration]
    if: always()

    steps:
      - name: Evaluate job results
        run: |
          results=(
            "${{ needs.lint.result }}"
            "${{ needs.build.result }}"
            "${{ needs.test-unit.result }}"
            "${{ needs.test-integration.result }}"
          )
          failed=false
          for result in "${results[@]}"; do
            if [[ "$result" != "success" && "$result" != "skipped" ]]; then
              echo "❌ A required job reported: $result"
              failed=true
            fi
          done
          if $failed; then
            echo "❌ One or more required checks did not pass."
            exit 1
          fi
          echo "✅ All CI checks passed successfully."
