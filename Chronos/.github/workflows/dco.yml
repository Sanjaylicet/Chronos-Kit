name: DCO And GPG Verification

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read
  pull-requests: read

jobs:
  dco:
    name: Enforce DCO Sign-Off
    runs-on: ubuntu-latest
    steps:
      - name: Check Developer Certificate of Origin sign-offs
        uses: KineticCafe/actions-dco@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

  gpg-signed-commits:
    name: Require Valid GPG-Signed PR Commits
    runs-on: ubuntu-latest
    steps:
      - name: Verify every PR commit uses a valid GPG signature
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pullNumber = context.payload.pull_request.number;
            const failures = [];

            let hasNextPage = true;
            let endCursor = null;

            while (hasNextPage) {
              const result = await github.graphql(
                `query($owner: String!, $repo: String!, $pullNumber: Int!, $endCursor: String) {
                  repository(owner: $owner, name: $repo) {
                    pullRequest(number: $pullNumber) {
                      commits(first: 100, after: $endCursor) {
                        pageInfo {
                          hasNextPage
                          endCursor
                        }
                        nodes {
                          commit {
                            oid
                            messageHeadline
                            signature {
                              __typename
                              ... on GpgSignature {
                                isValid
                                state
                              }
                              ... on SshSignature {
                                isValid
                                state
                              }
                              ... on SmimeSignature {
                                isValid
                                state
                              }
                              ... on UnknownSignature {
                                state
                              }
                              ... on UnsignedSignature {
                                state
                              }
                            }
                          }
                        }
                      }
                    }
                  }
                }`,
                { owner, repo, pullNumber, endCursor }
              );

              const commitConnection = result.repository.pullRequest.commits;

              for (const node of commitConnection.nodes) {
                const commit = node.commit;
                const signature = commit.signature;

                if (!signature) {
                  failures.push(`${commit.oid.slice(0, 7)} ${commit.messageHeadline}: missing commit signature metadata`);
                  continue;
                }

                if (signature.__typename !== 'GpgSignature') {
                  failures.push(
                    `${commit.oid.slice(0, 7)} ${commit.messageHeadline}: expected GpgSignature but found ${signature.__typename}`
                  );
                  continue;
                }

                if (!signature.isValid) {
                  failures.push(
                    `${commit.oid.slice(0, 7)} ${commit.messageHeadline}: invalid GPG signature (state: ${signature.state})`
                  );
                }
              }

              hasNextPage = commitConnection.pageInfo.hasNextPage;
              endCursor = commitConnection.pageInfo.endCursor;
            }

            if (failures.length > 0) {
              core.setFailed(
                `The following PR commits are missing a valid GPG signature:\n- ${failures.join('\n- ')}`
              );
            } else {
              core.info('All PR commits have valid GPG signatures.');
            }