name: Feature Request
description: Propose a new feature or enhancement for Chronos-Kit
title: "feat: "
labels: ["enhancement", "triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to propose a new feature! The more context you provide, the faster we can evaluate it.

  - type: textarea
    id: problem
    attributes:
      label: "Problem / Motivation"
      description: "What problem does this feature solve? Link related HIP if any."
      placeholder: "Currently there is no way to verify liquidity constraints before submitting a batch, leading to partial failure fees..."
    validations:
      required: true

  - type: input
    id: hip-ref
    attributes:
      label: "Related HIP Reference"
      placeholder: "HIP-551 / HIP-423 / none"

  - type: textarea
    id: proposed-api
    attributes:
      label: "Proposed API Surface"
      description: "Sketch the TypeScript interface or function signature you envision."
      value: |
        ```ts
        // Example proposed API
        const result = await preFlightEngine.verify(batch, payerAccountId);
        if (!result.success) throw new PreFlightValidationError(result.error!);
        ```
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: "Use Case / Example"
      description: "How would a developer use this feature in a real application?"
      placeholder: "A DeFi protocol wanting to schedule recurring multi-party settlement..."
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: "Priority"
      options:
        - "🔥 Critical — blocks production use"
        - "🚀 High — significant DX improvement"
        - "✨ Medium — nice to have"
        - "📌 Low — future consideration"
    validations:
      required: true

  - type: checkboxes
    id: contribution
    attributes:
      label: "Contribution"
      options:
        - label: "I am willing to submit a PR implementing this feature"
