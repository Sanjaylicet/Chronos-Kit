name: Bug Report
description: Report a bug in Chronos-Kit
title: "bug: "
labels: ["bug", "triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug! Please fill in as much detail as possible.

  - type: input
    id: version
    attributes:
      label: "@chronos-kit/core version"
      description: "What version are you using? (run `pnpm list @chronos-kit/core`)"
      placeholder: "0.1.0"
    validations:
      required: true

  - type: dropdown
    id: network
    attributes:
      label: "Hiero Network"
      options:
        - mainnet
        - testnet
        - previewnet
        - local (hiero-solo)
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: "Bug Description"
      description: "A clear and concise description of the bug."
      placeholder: "BatchCompiler throws BATCH_SIZE_EXCEEDED even when payload is < 6KB..."
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: "Steps to Reproduce"
      description: "Minimal reproducible example or steps."
      placeholder: |
        1. Create a batch with 3 transactions
        2. Call `compiler.compile(transactions, payerAccountId)`
        3. Observe error...
      value: |
        ```ts
        // Minimal reproduction
        ```
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: "Expected Behavior"
      placeholder: "The batch should compile successfully."
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: "Actual Behavior"
      placeholder: "Throws BatchSizeExceededError..."
    validations:
      required: true

  - type: input
    id: hip-ref
    attributes:
      label: "Relevant HIP (if any)"
      placeholder: "HIP-551 / HIP-423 / N/A"

  - type: textarea
    id: environment
    attributes:
      label: "Environment"
      description: "Node version, OS, relevant dependency versions."
      placeholder: |
        - Node: 20.x
        - OS: Ubuntu 22.04
        - @hashgraph/sdk: 2.40.0
